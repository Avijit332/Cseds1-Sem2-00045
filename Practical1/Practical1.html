
<html>
<head>
   <style>
body {
    font-family: Arial;
    text-align: center;
    background: orange;
}
.container {
    margin-top: 80px;
    padding: 100;
    margin: 30px;
    background: grey ;
}
input, button {
    padding: 10px;
    margin: 8px;
}
button {
    background: skyblue;
    color: white;
    border: none;
}
   </style>
</head>
<body>
    <div class="container">
<h2>Temperature Converter</h2>
<input type="number" id="celsius" placeholder="Enter Celsius">
<br>
<button onclick="convert()">Convert</button>
<p id="out"></p>
</div>
<script>
    function convert() {
    let c = document.getElementById("celsius").value;
    let f = (c * 9/5) + 32;
    document.getElementById("out").innerHTML = "Fahrenheit: " + f;
}
</script>
</body>
</html>
