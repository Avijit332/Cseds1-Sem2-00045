<!DOCTYPE html>
<html>
<head>
    <title>Even Odd Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            width: 350px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }

        #result {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Even and Odd Number Checker</h2>
        <label>
            Enter a Number:
        </label>
        <input type="number" id="number" placeholder="Enter a Number">
        <br>
        <button onclick="checkNumber()">Check</button>

        <div id="result"></div>
    </div>

    <script>
        function checkNumber() {
            let num = document.getElementById("number").value;

           

            if (num % 2 === 0) {
                document.getElementById("result").innerHTML = num + " is an Even Number";
            } else {
                document.getElementById("result").innerHTML = num + " is an Odd Number";
            }
        }
    </script>

</body>
</html>
